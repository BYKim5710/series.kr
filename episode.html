  <style>
    :root {
      --bg-color: #000000;
      --text-color: #f5f5f5;
      --btn-radius: 9999px;
      --btn-shadow: 0 14px 35px rgba(0, 0, 0, 0.6);
      --btn-font-size: 1.05rem;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
        "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      text-align: center;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
    }

    .hero img {
      display: block;
      width: 100%;
      height: auto;
    }

    .buttons {
      width: 100%;
      max-width: 640px;
      margin: 40px auto 80px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px 24px;
      border-radius: var(--btn-radius);
      text-decoration: none;
      font-weight: 600;
      font-size: var(--btn-font-size);
      color: #ffffff;
      box-shadow: var(--btn-shadow);
      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out,
        opacity 0.1s ease-out;
      letter-spacing: 0.02em;
    }

    .btn span {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: #2563eb;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(37, 99, 235, 0.6);
    }

    .btn-success {
      background: #16a34a;
    }

    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(22, 163, 74, 0.6);
    }

    .btn-warning {
      background: #ea580c;
    }

    .btn-warning:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(234, 88, 12, 0.6);
    }

    .btn:active {
      transform: translateY(1px) scale(0.99);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
      opacity: 0.9;
    }

    @media (min-width: 768px) {
      .buttons {
        gap: 22px;
      }
      .btn {
        padding: 20px 28px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>

    function getEpisodeIdFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("v");

      if (!raw) return episodes[episodes.length - 1].id;

      const id = parseInt(raw, 10);
      const found = episodes.find((e) => e.id === id);
      return found ? found.id : episodes[episodes.length - 1].id;
    }

    (function initEpisodePage() {
      const id = getEpisodeIdFromQuery();
      const ep = episodes.find((e) => e.id === id);

      if (!ep) return;

      const padded = String(ep.id).padStart(2, "0");

      // 문서 타이틀
      document.title = `${ep.title} | 신통신통회 시리즈`;

      // 섬네일 이미지
      const heroImg = document.getElementById("hero-image");
      heroImg.src = ep.thumb;
      heroImg.alt = ep.title;

      // 시청 버튼
      const watchBtn = document.getElementById("watch-button");
      const watchLabel = document.getElementById("watch-label");
      watchBtn.href = ep.youtube;
      watchLabel.textContent = `🎬 제${padded}회 영상 보기`;

      // 전체 시리즈 / 구독 링크
      const seriesBtn = document.getElementById("series-button");
      const subscribeBtn = document.getElementById("subscribe-button");

      seriesBtn.href =
        "https://bykim5710.github.io/series.kr/?v=" + padded;
      subscribeBtn.href =
        "https://bykim5710.github.io/series.kr/subscribe.html?v=" + padded;
